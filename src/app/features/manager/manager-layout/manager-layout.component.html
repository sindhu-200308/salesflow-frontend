<div class="crm-layout">
  <aside class="crm-sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">
        <div class="logo-icon">💼</div>
        <div>
          <div class="logo-text">SalesCRM</div>
          <div class="logo-sub">Manager Panel</div>
        </div>
      </div>
    </div>

    <div class="sidebar-user">
      <div class="user-info">
        <div class="avatar manager-avatar">{{ getInitials() }}</div>
        <div>
          <div class="user-name">{{ user?.name }}</div>
          <div class="user-role">Sales Manager</div>
        </div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Overview</div>
      <a class="nav-item" routerLink="/manager/dashboard" routerLinkActive="active">
        <span class="nav-icon">📊</span> Dashboard
      </a>
      <div class="nav-section-label">Management</div>
      <a class="nav-item" routerLink="/manager/leads" routerLinkActive="active">
        <span class="nav-icon">🎯</span> Assigned Leads
      </a>
      <a class="nav-item" routerLink="/manager/sales" routerLinkActive="active">
        <span class="nav-icon">💰</span> Sales Reports
      </a>
      <a class="nav-item" routerLink="/manager/employees" routerLinkActive="active">
        <span class="nav-icon">👥</span> My Team
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="btn-logout" (click)="logout()">
        <span>🚪</span> Sign Out
      </button>
    </div>
  </aside>

  <main class="crm-main">
    <div class="crm-content">
      <router-outlet />
    </div>
  </main>
</div>
